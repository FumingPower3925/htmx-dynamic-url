version: 2
updates:

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "FumingPower3925"
    assignees:
      - "FumingPower3925"
    ignore:
      - dependency-name: "chai"
        versions: [">= 5.0.0"]
    groups:
      all-npm-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    reviewers:
      - "FumingPower3925"
    assignees:
      - "FumingPower3925"
    groups:
      all-github-actions:
        patterns:
          - "*"